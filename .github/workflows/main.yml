name: Build and deploy Zola website

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Zola site
        run: docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/app" -w /app ghcr.io/getzola/zola:v0.22.0 build

      - name: Add extensionless feed aliases
        run: |
          find public -name atom.xml -exec sh -c '
            for feed_file do
              cp "$feed_file" "$(dirname "$feed_file")/feed"
            done
          ' sh {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
